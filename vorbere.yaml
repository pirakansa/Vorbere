version: 1

vars:
  BIN_DIR: ./bin
  MAIN_PACKAGE: ./cmd/vorbere
  RELEASE_TAGS: osusergo netgo
  DEBUG_TAGS: debug osusergo netgo
  LDFLAGS: -s -w -X main.Version=$(cat VERSION)

tasks:
  all:
    depends_on: [build]
    desc: default target equivalent

  build:
    run: |
      mkdir -p ${{ .vars.BIN_DIR }}/host
      go build -tags="${{ .vars.RELEASE_TAGS }}" -ldflags="${{ .vars.LDFLAGS }}" -trimpath -o ${{ .vars.BIN_DIR }}/host/ ${{ .vars.MAIN_PACKAGE }}
    desc: build host binary

  run:
    run: go run -tags="${{ .vars.RELEASE_TAGS }}" ${{ .vars.MAIN_PACKAGE }}
    desc: run CLI

  linux-amd64:
    run: |
      mkdir -p ${{ .vars.BIN_DIR }}/linux-amd64
      GOOS=linux GOARCH=amd64 go build -tags="${{ .vars.RELEASE_TAGS }}" -ldflags="${{ .vars.LDFLAGS }}" -trimpath -o ${{ .vars.BIN_DIR }}/linux-amd64/ ${{ .vars.MAIN_PACKAGE }}
    desc: build linux amd64 binary

  linux-arm:
    run: |
      mkdir -p ${{ .vars.BIN_DIR }}/linux-arm
      GOOS=linux GOARCH=arm go build -tags="${{ .vars.RELEASE_TAGS }}" -ldflags="${{ .vars.LDFLAGS }}" -trimpath -o ${{ .vars.BIN_DIR }}/linux-arm/ ${{ .vars.MAIN_PACKAGE }}
    desc: build linux arm binary

  linux-arm64:
    run: |
      mkdir -p ${{ .vars.BIN_DIR }}/linux-arm64
      GOOS=linux GOARCH=arm64 go build -tags="${{ .vars.RELEASE_TAGS }}" -ldflags="${{ .vars.LDFLAGS }}" -trimpath -o ${{ .vars.BIN_DIR }}/linux-arm64/ ${{ .vars.MAIN_PACKAGE }}
    desc: build linux arm64 binary

  darwin-amd64:
    run: |
      mkdir -p ${{ .vars.BIN_DIR }}/darwin-amd64
      GOOS=darwin GOARCH=amd64 go build -tags="${{ .vars.RELEASE_TAGS }}" -ldflags="${{ .vars.LDFLAGS }}" -trimpath -o ${{ .vars.BIN_DIR }}/darwin-amd64/ ${{ .vars.MAIN_PACKAGE }}
    desc: build darwin amd64 binary

  darwin-arm64:
    run: |
      mkdir -p ${{ .vars.BIN_DIR }}/darwin-arm64
      GOOS=darwin GOARCH=arm64 go build -tags="${{ .vars.RELEASE_TAGS }}" -ldflags="${{ .vars.LDFLAGS }}" -trimpath -o ${{ .vars.BIN_DIR }}/darwin-arm64/ ${{ .vars.MAIN_PACKAGE }}
    desc: build darwin arm64 binary

  win-amd64:
    run: |
      mkdir -p ${{ .vars.BIN_DIR }}/win-amd64
      GOOS=windows GOARCH=amd64 go build -tags="${{ .vars.RELEASE_TAGS }}" -ldflags="${{ .vars.LDFLAGS }}" -trimpath -o ${{ .vars.BIN_DIR }}/win-amd64/ ${{ .vars.MAIN_PACKAGE }}
    desc: build windows amd64 binary

  release-build:
    depends_on: [linux-amd64, linux-arm, linux-arm64, darwin-amd64, darwin-arm64, win-amd64]
    desc: build release binaries

  release-archives:
    depends_on: [release-build]
    run: |
      tar --gunzip --create --directory=${{ .vars.BIN_DIR }}/linux-amd64/ --file=./vorbere_linux-amd64.tar.gz .
      tar --gunzip --create --directory=${{ .vars.BIN_DIR }}/linux-arm/ --file=./vorbere_linux-arm.tar.gz .
      tar --gunzip --create --directory=${{ .vars.BIN_DIR }}/linux-arm64/ --file=./vorbere_linux-arm64.tar.gz .
      tar --gunzip --create --directory=${{ .vars.BIN_DIR }}/darwin-amd64/ --file=./vorbere_darwin-amd64.tar.gz .
      tar --gunzip --create --directory=${{ .vars.BIN_DIR }}/darwin-arm64/ --file=./vorbere_darwin-arm64.tar.gz .
      tar --gunzip --create --directory=${{ .vars.BIN_DIR }}/win-amd64/ --file=./vorbere_win-amd64.tar.gz .
    desc: package release archives

  release:
    depends_on: [release-archives]
    desc: build and package release artifacts

  debug:
    run: go run -tags="${{ .vars.DEBUG_TAGS }}" ${{ .vars.MAIN_PACKAGE }}
    desc: run with debug tag

  vet:
    run: go vet -tags="${{ .vars.RELEASE_TAGS }}" ./...
    desc: run go vet

  staticcheck:
    run: go tool staticcheck ./...
    desc: run staticcheck

  govulncheck:
    run: go tool govulncheck -tags "${{ .vars.RELEASE_TAGS }}" ./...
    desc: run govulncheck

  lint:
    depends_on: [vet, staticcheck]
    desc: run lint checks

  test:
    depends_on: [lint, build]
    run: go test -race -tags="${{ .vars.RELEASE_TAGS }}" -v ./...
    desc: run tests

  clean:
    run: |
      rm -fr ${{ .vars.BIN_DIR }}
      rm -f ./vorbere_*.tar.gz
      go clean
    desc: clean build artifacts
